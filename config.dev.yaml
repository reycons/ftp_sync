# ftp_sync — development configuration
# Secrets (FTP password) must be placed in .env — never in this file.

logging:
  level: DEBUG                        # DEBUG in dev, INFO in prod
  log_dir: logs                       # relative to project root
  app_name: ftp_sync

ftp:
  host: ftp.example.com
  port: 21
  user: your_ftp_username
  # FTP_PASSWORD is read from .env

sync:
  # List every remote directory to watch.  Add or remove paths freely.
  remote_paths:
    - /incoming/
    - /reports/

  # Root directory on this machine where downloaded files are saved.
  # Remote path structure is mirrored beneath this root.
  # Example: /incoming/file.csv → <local_destination>/incoming/file.csv
  local_destination: C:/ftp_downloads/dev

  # JSON file that tracks which files have already been downloaded.
  state_file: ftp_sync_state.dev.json

  # Number of files processed per download chunk.
  # Reduce if you hit memory pressure on very large directories.
  chunk_size: 50

filters:
  # Only download files with these extensions.
  # Leave the list empty ([]) to download all file types.
  extensions:
    - .csv
    - .txt
    - .xlsx

  # Optional glob pattern applied to filenames (case-insensitive).
  # Examples: "report_*", "*.daily.*"
  # Set to null to disable.
  name_pattern: null

  # Skip files older than this many days.
  # Set to null to download files of any age.
  max_age_days: null

schedule:
  # For documentation only — the actual schedule is set in Windows Task Scheduler.
  # See setup_task.ps1 and README.md.
  description: "Daily at 06:00 AM"
