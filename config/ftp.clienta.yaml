# FTP connection — client01
# Add the credentials below to your .env file.
#
#   FTP_USER_CLIENT01=your_username
#   FTP_PASSWORD_CLIENT01=your_password

connections:
  - name: client01
    ftp:
      host: ftp.client01.com
      port: 21
      user_env: FTP_USER_CLIENT01         # env var name — value comes from .env
      password_env: FTP_PASSWORD_CLIENT01 # env var name — value comes from .env

    sync:
      remote_paths:
        - /incoming/
        - /reports/
      local_destination: ~/ftp_downloads/client01
      state_file: ~/ftp_downloads/client01/.state.json
      initial_stamp: null   # ISO 8601 UTC e.g. "2026-01-01T00:00:00+00:00"

    filters:
      extensions:
        - .csv
        - .txt
        - .xlsx
      name_pattern: null    # glob e.g. "report_*" — null disables
      max_age_days: null    # integer e.g. 30 — null disables
