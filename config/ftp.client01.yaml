# FTP connection — client01
# Supported protocols: ftp | ftps | sftp
#
# Add credentials to .env:
#   FTP_USER_CLIENT01=your_username
#   FTP_PASSWORD_CLIENT01=your_password

connections:
  - name: client01
    ftp:
      protocol: ftp                       # ftp | ftps | sftp
      host: ftp.client01.com
      port: 21                            # 21 for ftp/ftps, 22 for sftp
      user_env: FTP_USER_CLIENT01
      password_env: FTP_PASSWORD_CLIENT01
      max_retry_sessions: 3               # abandon file after this many failed runs

    sync:
      remote_paths:
        - /incoming/                      # simple path
        - /archive/2026-*/               # glob — expands to all matching subdirs
      local_destination: ~/ftp_downloads/client01
      state_file: ~/ftp_downloads/client01/.state.json
      failed_file: ~/ftp_downloads/client01/.failed.json  # files that exceeded max retries
      initial_stamp: null

    filters:
      extensions:
        - .csv
        - .txt
        - .xlsx
      name_pattern: null
      max_age_days: null
